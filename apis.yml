apis:
  - aid: step-functions:step-functions
    name: AWS Step Functions API
    description: >-
      The AWS Step Functions API enables creating, managing, and executing state machines and activities. Key operations
      include creating and deleting state machines, starting and stopping executions, listing execution history,
      managing state machine versions and aliases, tagging resources, and sending task heartbeats from activity workers.
      The API uses AWS Signature Version 4 (SigV4) authentication.
