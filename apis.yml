aid: step-functions
name: AWS Step Functions
description: >-
  AWS Step Functions is a serverless orchestration service that enables developers to compose distributed applications
  and APIs using visual workflows called state machines. It supports Standard and Express workflows, activities,
  parallel execution, error handling, and integrates with over 200 AWS services. Step Functions uses the Amazon States
  Language (ASL) for defining workflow logic as JSON-based state machine definitions.
